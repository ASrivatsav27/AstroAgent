services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: astroagent-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: MONGO_URI
        sync: false
      - key: FRONTEND_URL
        value: https://astroagent-frontend.onrender.com

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: astroagent-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://astroagent-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
